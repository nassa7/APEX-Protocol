<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#07070f">
<title>APEX — Performance System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js" async defer></script>
<style>
:root {
  --bg:#07070f;--bg2:#0d0d18;--bg3:#141420;
  --card:rgba(16, 16, 24, 0.6); /* Glassmorphism Base */
  --border:rgba(34, 34, 58, 0.5);
  --accent:#c8ff3e;--blue:#3ed4ff;--orange:#ff6b3e;--purple:#a78bfa;
  --text:#eeeef8;--muted:#5a5a78;--green:#3effaa;--red:#ff4455;
  --r:14px;--ff:'Syne',sans-serif;--fm:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:var(--ff);min-height:100vh;overscroll-behavior:none}
body{display:flex;flex-direction:column;max-width:480px;margin:0 auto;padding-bottom:96px}

/* GLASSMORPHISM */
.glass{background:var(--card);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:var(--r)}

/* REST TIMER OVERLAY */
#restTimerOverlay{position:fixed;bottom:20px;right:20px;width:60px;height:60px;border-radius:50%;background:var(--accent);color:#000;display:none;align-items:center;justify-content:center;font-family:var(--fm);font-weight:800;z-index:100;box-shadow:0 0 20px var(--accent);cursor:pointer}

/* AUTH & ONBOARDING */
.overlay-screen{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center}
.hidden{display:none}

/* TYPOGRAPHY & CARDS */
.hdr{padding:40px 20px 12px;position:sticky;top:0;z-index:20;background:rgba(7,7,15,0.8);backdrop-filter:blur(20px)}
.tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;padding:10px 20px;position:sticky;top:85px;z-index:19;background:rgba(7,7,15,0.8);backdrop-filter:blur(20px)}
.tab{padding:10px 2px;border:1px solid var(--border);background:var(--card);color:var(--muted);border-radius:8px;font-family:var(--fm);font-size:9px;text-transform:uppercase;cursor:pointer}
.tab.on{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700}
.panel{display:none;padding:20px}
.panel.on{display:block}
.card{padding:16px;margin-bottom:12px}

/* RING LOGIC */
#calRing{transition:stroke-dashoffset 0.8s ease, stroke 0.5s ease}

/* INPUTS */
input, select{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--fm);padding:10px;width:100%;outline:none}
.btn{width:100%;padding:14px;border-radius:10px;border:none;font-weight:800;cursor:pointer;transition:transform 0.1s}
.btn:active{transform:scale(0.96)}
.btn-p{background:var(--accent);color:#000}

/* TRAINING LOGS */
.set-row{display:flex;gap:8px;margin-bottom:6px;align-items:center}
.set-input{flex:1;font-size:14px;text-align:center}
.set-chk{width:40px;height:40px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);color:var(--muted)}
.set-chk.logged{background:var(--green);color:#000;border-color:var(--green)}
.progression-highlight{border-color:var(--accent) !important;box-shadow:0 0 10px rgba(200,255,62,0.3)}

/* HEATMAP */
.heatmap{display:grid;grid-template-columns:repeat(auto-fit, minmax(60px, 1fr));gap:6px;margin-top:10px}
.hm-item{padding:6px;font-size:8px;text-align:center;border-radius:4px;background:var(--bg3);color:var(--muted)}
</style>
</head>
<body>

<div id="restTimerOverlay" onclick="stopRestTimer()">0:00</div>

<div class="overlay-screen" id="authScreen">
    <h1 style="font-size:32px;margin-bottom:8px">APEX <em>SYSTEM</em></h1>
    <p style="color:var(--muted);margin-bottom:30px;font-size:12px">Closed-Loop Performance Architecture</p>
    <button class="btn btn-p" onclick="handleSignIn()">Continue with Google</button>
    <button onclick="skipAuth()" style="margin-top:20px;background:none;border:none;color:var(--muted);font-family:var(--fm);font-size:10px">Continue Offline</button>
</div>

<div class="overlay-screen hidden" id="onboardScreen">
    <h2 style="margin-bottom:12px">System Calibration</h2>
    <p style="color:var(--muted);margin-bottom:20px;font-size:12px">Initialize biological profile for calorie and volume targets.</p>
    <div style="display:flex;flex-direction:column;gap:12px;width:100%;max-width:300px">
        <input type="number" id="obWeight" placeholder="Weight (kg)">
        <input type="number" id="obHeight" placeholder="Height (cm)">
        <input type="number" id="obAge" placeholder="Age">
        <select id="obGoal">
            <option value="hypertrophy">Hypertrophy (Muscle)</option>
            <option value="strength">Absolute Strength</option>
            <option value="loss">Fat Loss</option>
        </select>
        <button class="btn btn-p" onclick="finishOnboarding()">Initialize Protocol</button>
    </div>
</div>

<div class="sync-bar" id="syncBar" style="padding:6px 20px;font-size:9px;color:var(--muted);border-bottom:1px solid var(--border);display:flex;justify-content:space-between">
    <span id="syncStatus">○ System Ready</span>
    <span id="userEmail"></span>
</div>

<div class="hdr">
    <div style="font-family:var(--fm);color:var(--accent);letter-spacing:4px;font-size:10px">APEX V5</div>
    <h1 id="userName">GUEST <em>USER</em></h1>
</div>

<div class="tabs">
    <button class="tab on" onclick="swTab('dashboard',this)">Dash</button>
    <button class="tab" onclick="swTab('training',this)">Train</button>
    <button class="tab" onclick="swTab('nutrition',this)">Nutr</button>
    <button class="tab" onclick="swTab('sleep',this)">Sleep</button>
    <button class="tab" onclick="swTab('settings',this)">Set</button>
</div>

<div class="panel on" id="panel-dashboard">
    <div class="card glass">
        <div style="display:flex;align-items:center;gap:20px">
            <svg width="80" height="80" viewBox="0 0 80 80">
                <circle cx="40" cy="40" r="32" fill="none" stroke="#141420" stroke-width="8"/>
                <circle id="calRing" cx="40" cy="40" r="32" fill="none" stroke="var(--accent)" stroke-width="8" stroke-dasharray="201" stroke-dashoffset="201" stroke-linecap="round" transform="rotate(-90 40 40)"/>
            </svg>
            <div>
                <div style="font-size:10px;color:var(--muted);letter-spacing:2px">REMAINING</div>
                <div style="font-size:28px;font-weight:800" id="dashCalRem">0</div>
                <div style="font-size:10px;color:var(--muted)" id="dashCalLog">0 / 0 kcal</div>
            </div>
        </div>
    </div>

    <div class="card glass">
        <div style="font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:10px">VOLUME HEATMAP (7D)</div>
        <div class="heatmap" id="muscleHeatmap"></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="card glass"><div style="font-size:8px;color:var(--muted)">WEIGHT</div><div style="font-size:20px;font-weight:800" id="dashWt">--</div></div>
        <div class="card glass"><div style="font-size:8px;color:var(--muted)">PROTEIN</div><div style="font-size:20px;font-weight:800" id="dashProt">--</div></div>
    </div>
</div>

<div class="panel" id="panel-training">
    <div id="sessionList"></div>
</div>

<div class="panel" id="panel-nutrition">
    <div class="card glass">
        <div style="font-size:10px;color:var(--muted);margin-bottom:15px">LOG MACROS</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
            <input type="number" id="nCal" placeholder="Cals">
            <input type="number" id="nProt" placeholder="Prot">
        </div>
        <button class="btn btn-p" onclick="logNutrition()">Log Intake</button>
    </div>
</div>

<div class="panel" id="panel-settings">
    <button class="btn" style="background:var(--red);color:#000" onclick="signOut()">Sign Out</button>
    <button class="btn" style="margin-top:10px;background:var(--bg3);color:var(--text)" onclick="confirmFullReset()">Reset System</button>
</div>

<script>
// INITIAL DEFINITIONS
const SESSIONS_DEF = [
    {name:'PUSH', exercises:[{name:'Incline DB Press',sets:4,muscle:'Chest'}, {name:'Shoulder Press',sets:3,muscle:'Shoulders'}]},
    {name:'PULL', exercises:[{name:'Lat Pulldown',sets:4,muscle:'Back'}, {name:'DB Curl',sets:3,muscle:'Arms'}]}
];

let S = (() => {
    const d = localStorage.getItem('apex_v5');
    return d ? JSON.parse(d) : {
        onboarded: false,
        profile: {weight:0, height:0, age:0, goal:'hypertrophy'},
        nutrition: {cal:0, protein:0},
        sessions: [null, null],
        setLogs: {},
        weights: [],
        lastModified: new Date().toISOString()
    };
})();

function save() { 
    S.lastModified = new Date().toISOString();
    localStorage.setItem('apex_v5', JSON.stringify(S)); 
    renderAll();
}

// NAVIGATION
function swTab(name, btn) {
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
    document.getElementById('panel-'+name).classList.add('on');
    if(btn) btn.classList.add('on');
}

// ONBOARDING
function checkOnboarding() {
    if(!S.onboarded) {
        document.getElementById('onboardScreen').classList.remove('hidden');
    }
}

function finishOnboarding() {
    S.profile.weight = parseFloat(document.getElementById('obWeight').value);
    S.profile.height = parseFloat(document.getElementById('obHeight').value);
    S.profile.age = parseInt(document.getElementById('obAge').value);
    S.profile.goal = document.getElementById('obGoal').value;
    S.onboarded = true;
    document.getElementById('onboardScreen').classList.add('hidden');
    save();
}

// CALORIE ENGINE (BMR Calculation)
function getTargetCals() {
    if(!S.onboarded) return 2000;
    // Mifflin-St Jeor
    const bmr = (10 * S.profile.weight) + (6.25 * S.profile.height) - (5 * S.profile.age) + 5;
    return Math.round(bmr * 1.5); // Baseline active multiplier
}

// UI RENDERING
function renderAll() {
    const targets = getTargetCals();
    const protTarget = Math.round(S.profile.weight * 2.2);
    
    // Dash
    document.getElementById('dashCalRem').textContent = Math.max(0, targets - S.nutrition.cal);
    document.getElementById('dashCalLog').textContent = `${S.nutrition.cal} / ${targets} kcal`;
    document.getElementById('dashProt').textContent = `${S.nutrition.protein} / ${protTarget}g`;
    document.getElementById('dashWt').textContent = S.profile.weight + 'kg';
    
    // Ring color logic
    const pct = S.nutrition.cal / targets;
    const ring = document.getElementById('calRing');
    ring.setAttribute('stroke-dashoffset', 201 - (Math.min(pct, 1) * 201));
    ring.setAttribute('stroke', pct > 1.1 ? 'var(--red)' : pct > 0.9 ? 'var(--green)' : 'var(--accent)');

    renderTraining();
    renderHeatmap();
}

function renderTraining() {
    const list = document.getElementById('sessionList');
    list.innerHTML = '';
    SESSIONS_DEF.forEach((sess, si) => {
        let exHtml = '';
        sess.exercises.forEach((ex, ei) => {
            const key = `${si}_${ei}`;
            const logs = S.setLogs[key] || Array(ex.sets).fill({kg:'', reps:'', done:false});
            const rows = logs.map((l, li) => `
                <div class="set-row">
                    <span style="font-size:10px;width:20px">S${li+1}</span>
                    <input class="set-input glass" type="number" placeholder="kg" value="${l.kg}" oninput="updSet(${si},${ei},${li},'kg',this.value)">
                    <input class="set-input glass" type="number" placeholder="reps" value="${l.reps}" oninput="updSet(${si},${ei},${li},'reps',this.value)">
                    <button class="set-chk ${l.done?'logged':''}" onclick="togSet(${si},${ei},${li})">${l.done?'✓':'○'}</button>
                </div>
            `).join('');
            exHtml += `<div class="card glass" style="margin-bottom:10px"><strong>${ex.name}</strong><div style="margin-top:8px">${rows}</div></div>`;
        });
        list.innerHTML += `<div class="card glass" style="border-left:4px solid var(--accent)"><h3>${sess.name}</h3>${exHtml}</div>`;
    });
}

function renderHeatmap() {
    const map = document.getElementById('muscleHeatmap');
    const muscles = ['Chest','Back','Shoulders','Arms','Legs'];
    map.innerHTML = muscles.map(m => `<div class="hm-item glass">${m}</div>`).join('');
}

// LOGGING LOGIC
function updSet(si,ei,li,f,v) {
    const key = `${si}_${ei}`;
    if(!S.setLogs[key]) S.setLogs[key] = Array(SESSIONS_DEF[si].exercises[ei].sets).fill({kg:'', reps:'', done:false});
    S.setLogs[key][li] = {...S.setLogs[key][li], [f]: v};
    localStorage.setItem('apex_v5', JSON.stringify(S));
}

function togSet(si,ei,li) {
    const key = `${si}_${ei}`;
    S.setLogs[key][li].done = !S.setLogs[key][li].done;
    if(S.setLogs[key][li].done) {
        if(navigator.vibrate) navigator.vibrate(20);
        startRestTimer(90); // 90s standard rest
    }
    save();
}

function logNutrition() {
    S.nutrition.cal += parseFloat(document.getElementById('nCal').value) || 0;
    S.nutrition.protein += parseFloat(document.getElementById('nProt').value) || 0;
    document.getElementById('nCal').value = '';
    document.getElementById('nProt').value = '';
    save();
}

// REST TIMER ENGINE
let timerInt;
function startRestTimer(sec) {
    clearInterval(timerInt);
    const overlay = document.getElementById('restTimerOverlay');
    overlay.style.display = 'flex';
    let rem = sec;
    timerInt = setInterval(() => {
        rem--;
        const m = Math.floor(rem/60), s = rem%60;
        overlay.textContent = `${m}:${s<10?'0':''}${s}`;
        if(rem <= 0) {
            stopRestTimer();
            if(navigator.vibrate) navigator.vibrate([100,50,100]);
        }
    }, 1000);
}
function stopRestTimer() { 
    clearInterval(timerInt); 
    document.getElementById('restTimerOverlay').style.display = 'none'; 
}

// GOOGLE AUTH BRIDGE
function handleSignIn() {
    const clientId = "846809219451-i3jbng379lbfgqad4t25tdesnij11lpq.apps.googleusercontent.com";
    const tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: clientId,
        scope: 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive.file profile email',
        callback: (resp) => {
            if(resp.access_token) {
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('syncStatus').textContent = '● Online Sync Active';
                checkOnboarding();
                save();
            }
        }
    });
    tokenClient.requestAccessToken();
}

function skipAuth() {
    document.getElementById('authScreen').classList.add('hidden');
    checkOnboarding();
    renderAll();
}

window.onload = () => { renderAll(); checkOnboarding(); };
</script>
</body>
</html>
